# Application
spring.application.name=ims-backend
server.port=8080

# PostgreSQL - Work Items + RCA
spring.datasource.url=jdbc:postgresql://localhost:5432/imsdb?TimeZone=UTC
spring.datasource.username=imsuser
spring.datasource.password=imspassword
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# MongoDB - Raw signals
spring.data.mongodb.uri=mongodb://localhost:27017/imsdb

# Redis - Dashboard cache
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=1000

# Logging
logging.level.com.zeotap.ims=INFO
logging.level.org.springframework.web=WARN
